services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - app_data:/app
    networks:
      - net
    depends_on:
      db:
        condition: service_healthy
  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_shop
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net
    volumes:
      - db_data:/var/lib/mysql
  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - app_data:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - net
    depends_on:
      - app
volumes:
  db_data:
  app_data:
networks:
  net:
    driver: bridge
